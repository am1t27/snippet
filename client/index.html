<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      Content-Security-Policy (I3 hardening). Allows: our own bundle, Google
      Identity Services (accounts.google.com + gstatic), Google Fonts, iTunes
      preview audio, and Socket.IO to any https/wss backend. connect-src keeps
      ws:/wss: so the dev proxy and any deployed backend work. Tighten
      connect-src to your exact backend origin once it's fixed.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self' https://accounts.google.com https://apis.google.com https://www.gstatic.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        media-src 'self' https: blob:;
        frame-src https://accounts.google.com;
        connect-src 'self' https: ws: wss:;
        base-uri 'self';
        object-src 'none'"
    />
    <title>Snippet</title>
    <meta name="description" content="Real-time multiplayer music guessing game. Hear a snippet, name the track." />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#13131E" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Snippet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <!-- Google Identity Services (sign-in). Harmless if no client ID is set. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="bg-[#0A0B0D]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
